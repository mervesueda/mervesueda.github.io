<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulama 2 — Birim Dönüştürücü</title>
    <style>
        :root {
            --renk-bg:         #f0f6ff;
            --renk-beyaz:      #ffffff;
            --renk-sinir:      #c8d8f0;
            --renk-vurgu:      #4a7fcb;
            --renk-vurgu-koyu: #2f5fa8;
            --renk-metin:      #2c3e6b;
            --renk-acik:       #edf4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Georgia, serif;
            background: var(--renk-bg);
            color: var(--renk-metin);
            min-height: 100vh;
        }

        nav {
            background: var(--renk-beyaz);
            border-bottom: 1px solid var(--renk-sinir);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            font-size: 17px;
            font-weight: bold;
            color: var(--renk-metin);
        }

        nav ul { list-style: none; }
        nav ul li { display: inline-block; margin-left: 6px; }
        nav ul li a {
            text-decoration: none;
            color: var(--renk-metin);
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 4px;
        }
        nav ul li a:hover {
            background: var(--renk-vurgu);
            color: #fff;
        }

        .sayfa {
            max-width: 900px;
            margin: 36px auto;
            padding: 0 16px;
        }

        .sayfa-baslik {
            font-size: 13.5px;
            color: #6b82ab;
            margin-bottom: 20px;
            font-style: italic;
        }

        .kartlar-grid {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .donusturucu-kart {
            flex: 1;
            min-width: 280px;
            background: var(--renk-beyaz);
            border: 1px solid var(--renk-sinir);
            border-radius: 8px;
            padding: 28px;
        }

        .donusturucu-kart h2 {
            font-size: 20px;
            color: #1a2f5e;
            margin-bottom: 20px;
        }

        .form-grup {
            margin-bottom: 16px;
        }

        .form-grup label {
            display: block;
            font-size: 13px;
            color: #6b82ab;
            margin-bottom: 6px;
        }

        .form-grup input,
        .form-grup select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--renk-sinir);
            border-radius: 5px;
            font-size: 14px;
            font-family: Georgia, serif;
            color: var(--renk-metin);
            background: #f7faff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-grup input:focus,
        .form-grup select:focus {
            border-color: var(--renk-vurgu);
        }

        .btn-hesapla {
            width: 100%;
            background: var(--renk-vurgu);
            color: #fff;
            border: none;
            padding: 12px 0;
            font-size: 14px;
            font-family: Georgia, serif;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s;
        }

        .btn-hesapla:hover {
            background: var(--renk-vurgu-koyu);
        }

        .sonuc-kutu {
            margin-top: 16px;
            padding: 16px;
            background: var(--renk-acik);
            border: 1px solid var(--renk-sinir);
            border-radius: 5px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #1a2f5e;
            display: none;
        }

        .sonuc-kutu.goster {
            display: block;
        }

        .hata {
            color: #c0392b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .geri-alan {
            margin-top: 28px;
            text-align: center;
        }

        .geri-link {
            color: var(--renk-vurgu);
            text-decoration: none;
            font-size: 13.5px;
        }

        .geri-link:hover {
            color: var(--renk-vurgu-koyu);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">Merve Sueda Aydın</span>
        <ul>
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="index.html">Hakkımda</a></li>
            <li><a href="index.html">Projeler</a></li>
            <li><a href="index.html">İletişim</a></li>
        </ul>
    </nav>

    <div class="sayfa">
        <p class="sayfa-baslik">Uygulama 2 — Birim Dönüştürücü</p>

        <div class="kartlar-grid">

            <!-- Kart 1 -->
            <div class="donusturucu-kart">
                <h2>Birim Dönüştürücü</h2>

                <div class="form-grup">
                    <label>Değer Giriniz:</label>
                    <input type="text" id="deger1" placeholder="Örn: 50">
                </div>

                <div class="form-grup">
                    <label>Dönüşüm Tipi:</label>
                    <select id="tip1">
                        <option value="">Lütfen seçin...</option>
                        <optgroup label="Sıcaklık">
                            <option value="c_f">Celsius → Fahrenheit</option>
                            <option value="f_c">Fahrenheit → Celsius</option>
                            <option value="c_k">Celsius → Kelvin</option>
                            <option value="k_c">Kelvin → Celsius</option>
                        </optgroup>
                        <optgroup label="Uzunluk">
                            <option value="m_km">Metre → Kilometre</option>
                            <option value="km_m">Kilometre → Metre</option>
                            <option value="m_mil">Metre → Mil</option>
                            <option value="mil_m">Mil → Metre</option>
                        </optgroup>
                        <optgroup label="Kütle">
                            <option value="kg_g">Kilogram → Gram</option>
                            <option value="g_kg">Gram → Kilogram</option>
                        </optgroup>
                    </select>
                </div>

                <p class="hata" id="hata1">Lütfen geçerli bir sayı girin ve dönüşüm tipini seçin.</p>

                <button class="btn-hesapla" onclick="donustur(1)">Hesapla</button>

                <div class="sonuc-kutu" id="sonuc1"></div>
            </div>

            <!-- Kart 2 -->
            <div class="donusturucu-kart">
                <h2>Birim Dönüştürücü</h2>

                <div class="form-grup">
                    <label>Değer Giriniz:</label>
                    <input type="text" id="deger2" placeholder="Örn: 50">
                </div>

                <div class="form-grup">
                    <label>Dönüşüm Tipi:</label>
                    <select id="tip2">
                        <option value="">Lütfen seçin...</option>
                        <optgroup label="Sıcaklık">
                            <option value="c_f">Celsius → Fahrenheit</option>
                            <option value="f_c">Fahrenheit → Celsius</option>
                            <option value="c_k">Celsius → Kelvin</option>
                            <option value="k_c">Kelvin → Celsius</option>
                        </optgroup>
                        <optgroup label="Uzunluk">
                            <option value="m_km">Metre → Kilometre</option>
                            <option value="km_m">Kilometre → Metre</option>
                            <option value="m_mil">Metre → Mil</option>
                            <option value="mil_m">Mil → Metre</option>
                        </optgroup>
                        <optgroup label="Kütle">
                            <option value="kg_g">Kilogram → Gram</option>
                            <option value="g_kg">Gram → Kilogram</option>
                        </optgroup>
                    </select>
                </div>

                <p class="hata" id="hata2">Lütfen geçerli bir sayı girin ve dönüşüm tipini seçin.</p>

                <button class="btn-hesapla" onclick="donustur(2)">Hesapla</button>

                <div class="sonuc-kutu" id="sonuc2"></div>
            </div>

        </div>

        <div class="geri-alan">
            <a class="geri-link" href="index.html">← Portfolyoya Dön</a>
        </div>
    </div>

    <script>
        function hesapla(deger, tip) {
            switch(tip) {
                case 'c_f':  return (deger * 9/5) + 32;
                case 'f_c':  return (deger - 32) * 5/9;
                case 'c_k':  return deger + 273.15;
                case 'k_c':  return deger - 273.15;
                case 'm_km': return deger / 1000;
                case 'km_m': return deger * 1000;
                case 'm_mil': return deger / 1609.344;
                case 'mil_m': return deger * 1609.344;
                case 'kg_g': return deger * 1000;
                case 'g_kg': return deger / 1000;
                default: return null;
            }
        }

        function birimAdi(tip) {
            const map = {
                'c_f': ['°C','°F'], 'f_c': ['°F','°C'],
                'c_k': ['°C','K'],  'k_c': ['K','°C'],
                'm_km': ['m','km'], 'km_m': ['km','m'],
                'm_mil': ['m','mi'], 'mil_m': ['mi','m'],
                'kg_g': ['kg','g'], 'g_kg': ['g','kg']
            };
            return map[tip] || ['',''];
        }

        function formatSayi(s) {
            // Ondalıklı ise max 3 basamak, tam ise tam göster
            if (Number.isInteger(s)) return s.toLocaleString('tr-TR');
            return parseFloat(s.toFixed(3)).toLocaleString('tr-TR');
        }

        function donustur(n) {
            const degerStr = document.getElementById('deger' + n).value.trim();
            const tip = document.getElementById('tip' + n).value;
            const hata = document.getElementById('hata' + n);
            const sonucKutu = document.getElementById('sonuc' + n);

            const deger = parseFloat(degerStr.replace(',', '.'));

            if (isNaN(deger) || !tip) {
                hata.style.display = 'block';
                sonucKutu.classList.remove('goster');
                return;
            }

            hata.style.display = 'none';

            const sonuc = hesapla(deger, tip);
            const [birim1, birim2] = birimAdi(tip);

            sonucKutu.textContent = 'Sonuç: ' + formatSayi(sonuc) + ' ' + birim2;
            sonucKutu.classList.add('goster');
        }
    </script>

</body>
</html>
