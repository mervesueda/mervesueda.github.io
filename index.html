<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim Formu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="contact-container">
    <h2>İletişim</h2>

    <form>
      <label for="adsoyad">Ad Soyad:</label>
      <input type="text" id="adsoyad" placeholder="Merve Sueda Aydın" />

      <label for="email">E-posta:</label>
      <input type="email" id="email" placeholder="ornek@mail.com" />

      <label for="sifre">Başvuru Takip Şifresi:</label>
      <input type="password" id="sifre" placeholder="Şifrenizi girin" />

      <label>İletişim Tercihi:</label>
      <div class="option-box">
        <label><input type="radio" name="iletisim" checked /> Bana e-posta ile ulaşın — mervesueda2005@gmail.com</label>
        <label><input type="radio" name="iletisim" /> Bana telefonla ulaşın — +90 532 847 19 63</label>
      </div>

      <label>İlgi Alanları / Yetenekler:</label>
      <div class="option-box">
        <label><input type="checkbox" /> HTML</label>
        <label><input type="checkbox" /> CSS</label>
        <label><input type="checkbox" /> Algoritma</label>
      </div>

      <label for="konu">Konu:</label>
      <select id="konu">
        <option value="" disabled selected>Lütfen bir konu seçin...</option>
        <option>İş Teklifi</option>
        <option>Soru</option>
        <option>Geri Bildirim</option>
      </select>

      <label for="dosya">CV veya Fotoğraf Yükle:</label>
      <input type="file" id="dosya" />

      <label for="mesaj">Mesajınız:</label>
      <textarea id="mesaj" placeholder="Mesajınızı buraya yazabilirsiniz..."></textarea>

      <div class="btn-group">
        <button type="submit">Gönder</button>
        <button type="reset">Temizle</button>
      </div>
    </form>
  </div>

</body>
</html>
