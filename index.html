<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim Formu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef4fb;
      margin: 0;
      padding: 0;
    }

    .contact-container {
      width: 550px;
      margin: 60px auto;
      background-color: #ffffff;
      padding: 35px;
      border: 1px solid #b3d4f0;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #2a7ab8;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #b3d4f0;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      height: 110px;
      resize: vertical;
    }

    .option-box {
      border: 1px solid #b3d4f0;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      background-color: #f0f7ff;
    }

    .option-box label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .option-box label:last-child {
      margin-bottom: 0;
    }

    .option-box input[type="radio"],
    .option-box input[type="checkbox"] {
      width: auto;
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .btn-group button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-group button[type="submit"] {
      background-color: #2a7ab8;
      color: white;
    }

    .btn-group button[type="reset"] {
      background-color: #7ab8e0;
      color: white;
    }
  </style>
</head>
<body>

  <div class="contact-container">
    <h2>İletişim</h2>

    <form>
      <label for="adsoyad">Ad Soyad:</label>
      <input type="text" id="adsoyad" placeholder="Merve Sueda Aydın" />

      <label for="email">E-posta:</label>
      <input type="email" id="email" placeholder="ornek@mail.com" />

      <label for="sifre">Başvuru Takip Şifresi:</label>
      <input type="password" id="sifre" placeholder="Şifrenizi girin" />

      <label>İletişim Tercihi:</label>
      <div class="option-box">
        <label><input type="radio" name="iletisim" checked /> Bana e-posta ile ulaşın — mervesueda2005@gmail.com</label>
        <label><input type="radio" name="iletisim" /> Bana telefonla ulaşın — +90 532 847 19 63</label>
      </div>

      <label>İlgi Alanları / Yetenekler:</label>
      <div class="option-box">
        <label><input type="checkbox" /> HTML</label>
        <label><input type="checkbox" /> CSS</label>
        <label><input type="checkbox" /> Algoritma</label>
      </div>

      <label for="konu">Konu:</label>
      <select id="konu">
        <option value="" disabled selected>Lütfen bir konu seçin...</option>
        <option>İş Teklifi</option>
        <option>Soru</option>
        <option>Geri Bildirim</option>
      </select>

      <label for="dosya">CV veya Fotoğraf Yükle:</label>
      <input type="file" id="dosya" />

      <label for="mesaj">Mesajınız:</label>
      <textarea id="mesaj" placeholder="Mesajınızı buraya yazabilirsiniz..."></textarea>

      <div class="btn-group">
        <button type="submit">Gönder</button>
        <button type="reset">Temizle</button>
      </div>
    </form>
  </div>

</body>
</html>
