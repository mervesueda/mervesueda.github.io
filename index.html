<div class="contact-container">
    <h2>İletişim Formu</h2>
    <form action="#">
        <label for="name">Ad Soyad</label>
        <input type="text" id="name" name="name" placeholder="Adınızı giriniz..." required>

        <label for="email">E-posta</label>
        <input type="email" id="email" name="email" placeholder="E-posta adresinizi giriniz..." required>

        <label for="subject">Konu</label>
        <select id="subject" name="subject">
            <option value="">Seçiniz...</option>
            <option value="is-teklifi">İş Teklifi</option>
            <option value="soru">Soru</option>
            <option value="geri-bildirim">Geri Bildirim</option>
        </select>

        <label for="message">Mesaj</label>
        <textarea id="message" name="message" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>

        <button type="submit">Gönder</button>
    </form>
</div>
